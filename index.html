<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Mini Game</title>
  <meta name="description" content="Play a quick arithmetic challenge: answer 5 math questions correctly to win.">
  <meta name="theme-color" content="#0f766e">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Math Mini Game">
  <meta property="og:description" content="Answer 5 arithmetic questions correctly and win the mini game.">
  <meta property="og:url" content="https://52311774-hash.github.io/mathgame/">
  <meta property="og:image" content="https://52311774-hash.github.io/mathgame/og-image.svg">
  <meta property="og:image:alt" content="Math Mini Game social preview card">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Math Mini Game">
  <meta name="twitter:description" content="Answer 5 arithmetic questions correctly and win the mini game.">
  <meta name="twitter:image" content="https://52311774-hash.github.io/mathgame/og-image.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <h1>Math Mini Game</h1>
    <p class="subtitle">Answer 5 questions correctly to win.</p>

    <section class="status" aria-live="polite">
      <p><strong>Correct Answers:</strong> <span id="score">0</span> / 5</p>
    </section>

    <section class="question-area">
      <h2 id="question">Press Start to begin!</h2>
    </section>

    <form id="answer-form" class="answer-form" autocomplete="off">
      <label for="answer-input">Your answer</label>
      <input id="answer-input" type="number" step="any" required disabled>
      <button id="submit-btn" type="submit" disabled>Submit</button>
    </form>

    <div class="actions">
      <button id="start-btn" type="button">Start Game</button>
      <button id="restart-btn" type="button" class="hidden">Play Again</button>
    </div>

    <p id="feedback" class="feedback" aria-live="polite"></p>
  </main>

  <script src="game.js"></script>
</body>
</html>
